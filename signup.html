<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - VictorNewb</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        background: #0a0a0a;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .auth-box {
        background: #141414;
        padding: 50px 40px;
        border-radius: 20px;
        border: 1px solid #1a1a1a;
        max-width: 420px;
        width: 100%;
      }
      .auth-logo {
        font-size: 32px;
        font-weight: bold;
        color: #fff;
        text-decoration: none;
        display: block;
        text-align: center;
        margin-bottom: 8px;
      }
      .auth-logo span {
        color: #00ff88;
      }
      .auth-box p.sub {
        color: #888;
        text-align: center;
        margin-bottom: 30px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        color: #b0b0b0;
        font-size: 14px;
        margin-bottom: 6px;
      }
      .form-group input {
        width: 100%;
        padding: 14px 16px;
        background: #1a1a1a;
        border: 2px solid #2a2a2a;
        border-radius: 10px;
        color: #fff;
        font-size: 15px;
        transition: 0.3s;
      }
      .form-group input:focus {
        outline: none;
        border-color: #00ff88;
      }
      .auth-btn {
        width: 100%;
        padding: 16px;
        background: #00ff88;
        color: #0a0a0a;
        border: none;
        border-radius: 10px;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }
      .auth-btn:hover {
        background: #00cc6a;
        transform: translateY(-2px);
      }
      .auth-footer {
        text-align: center;
        margin-top: 25px;
        color: #888;
      }
      .auth-footer a {
        color: #00ff88;
        text-decoration: none;
      }
      .auth-footer a:hover {
        text-decoration: underline;
      }
      .msg {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 15px;
        display: none;
      }
      .msg.success {
        background: #00ff88;
        color: #0a0a0a;
        display: block;
      }
      .msg.error {
        background: #ff4444;
        color: #fff;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="auth-box">
      <a href="index.html" class="auth-logo">Victor<span>Newb</span></a>
      <p class="sub">Create your free account</p>

      <div id="message" class="msg"></div>

      <form onsubmit="signup(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Enter your name" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="form-group">
          <label>Password (min 6 characters)</label>
          <input
            type="password"
            id="password"
            placeholder="Create a password"
            required
            minlength="6"
          />
        </div>
        <button type="submit" class="auth-btn">Create Account →</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>

    <script>
      function signup(e) {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const msg = document.getElementById("message");

        if (!name || !email || !password) {
          msg.className = "msg error";
          msg.textContent = "Please fill in all fields!";
          return;
        }

        // Get existing users
        let users = JSON.parse(localStorage.getItem("victor_users") || "[]");

        // Check if email exists
        if (users.find((u) => u.email === email)) {
          msg.className = "msg error";
          msg.textContent = "Email already registered! Please login.";
          return;
        }

        // Save user
        users.push({ name, email, password });
        localStorage.setItem("victor_users", JSON.stringify(users));
        localStorage.setItem("victor_current", JSON.stringify({ name, email }));

        msg.className = "msg success";
        msg.textContent = "✅ Account created! Redirecting...";

        setTimeout(() => (window.location.href = "dashboard.html"), 1500);
      }
    </script>
  </body>
</html>
